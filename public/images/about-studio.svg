<svg width="900" height="1100" viewBox="0 0 900 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="900" height="1100" fill="#1e1a14"/>
  <defs>
    <linearGradient id="studioG" x1="0" y1="0" x2="900" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2418"/>
      <stop offset="60%" stop-color="#1e1a14"/>
      <stop offset="100%" stop-color="#14100c"/>
    </linearGradient>
    <radialGradient id="studioLight" cx="450" cy="400" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5a46d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="900" height="1100" fill="url(#studioG)"/>
  <rect width="900" height="1100" fill="url(#studioLight)"/>
  <!-- Studio drafting table -->
  <rect x="100" y="500" width="700" height="16" rx="2" fill="#2e2618" stroke="#c5a46d" stroke-width="0.75" stroke-opacity="0.5"/>
  <!-- Drawings on table -->
  <rect x="150" y="420" width="250" height="80" fill="#f0ece6" opacity="0.12"/>
  <rect x="450" y="430" width="280" height="70" fill="#f0ece6" opacity="0.1"/>
  <!-- Grid lines on drawings -->
  <line x1="160" y1="440" x2="390" y2="440" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="160" y1="460" x2="390" y2="460" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="160" y1="480" x2="390" y2="480" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Vertical walls -->
  <rect x="60" y="100" width="2" height="900" fill="#c5a46d" opacity="0.25"/>
  <rect x="840" y="100" width="2" height="900" fill="#c5a46d" opacity="0.25"/>
  <!-- Pendant light -->
  <line x1="450" y1="0" x2="450" y2="280" stroke="#c5a46d" stroke-width="0.75" stroke-opacity="0.6"/>
  <ellipse cx="450" cy="290" rx="40" ry="14" fill="none" stroke="#c5a46d" stroke-width="1" stroke-opacity="0.5"/>
  <ellipse cx="450" cy="290" rx="20" ry="6" fill="#c5a46d" opacity="0.2"/>
  <!-- Floor line -->
  <rect x="0" y="1020" width="900" height="1" fill="#c5a46d" opacity="0.2"/>
  <!-- Label -->
  <text x="60" y="1070" font-family="Georgia, serif" font-size="12" fill="#c5a46d" opacity="0.5" letter-spacing="3">VINAY ATELIER STUDIO · EST. 2014</text>
</svg>
