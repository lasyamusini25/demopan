  <!-- Heritage ornament -->
  <circle cx="300" cy="150" r="60" fill="none" stroke="#c5a46d" stroke-width="0.75" stroke-opacity="0.4"/>
  <circle cx="300" cy="150" r="40" fill="none" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Floor -->
  <rect x="0" y="700" width="1400" height="300" fill="#12100a"/>
