  <line x1="0" y1="750" x2="1400" y2="750" stroke="#c5a46d" stroke-width="0.3" stroke-opacity="0.2"/>
  <line x1="0" y1="800" x2="1400" y2="800" stroke="#c5a46d" stroke-width="0.3" stroke-opacity="0.15"/>
  <!-- Label -->
  <text x="100" y="950" font-family="Georgia, serif" font-size="14" fill="#c5a46d" opacity="0.6" letter-spacing="4">HERITAGE HOME RENEWAL · BEGUMPET</text>
