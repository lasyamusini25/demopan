<svg width="1400" height="1000" viewBox="0 0 1400 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="1000" fill="#1e1810"/>
  <defs>
    <linearGradient id="heritageG" x1="0" y1="0" x2="0" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a2018"/>
      <stop offset="50%" stop-color="#1e1810"/>
      <stop offset="100%" stop-color="#14100a"/>
    </linearGradient>
    <radialGradient id="warmLight" cx="500" cy="400" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5a46d" stop-opacity="0.18"/>
