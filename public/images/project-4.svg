    </radialGradient>
  </defs>
  <rect width="1400" height="1000" fill="url(#heritageG)"/>
  <rect width="1400" height="1000" fill="url(#warmLight)"/>
  <!-- Arch windows -->
  <path d="M200 150 L200 550 Q200 650 300 650 Q400 650 400 550 L400 150 Z" fill="#2a2010" stroke="#c5a46d" stroke-width="1" stroke-opacity="0.4"/>
  <path d="M220 170 L220 540 Q220 630 300 630 Q380 630 380 540 L380 170 Z" fill="#1a3020" opacity="0.5"/>
