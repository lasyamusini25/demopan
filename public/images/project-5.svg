  <rect x="450" y="60" width="200" height="500" fill="#d0c8bc" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>
  <rect x="720" y="100" width="320" height="280" fill="#dbd3c7" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
