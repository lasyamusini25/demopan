<svg width="1400" height="1000" viewBox="0 0 1400 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="1000" fill="#0e0c0a"/>
  <defs>
    <linearGradient id="retailG" x1="0" y1="0" x2="1400" y2="1000" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1510"/>
      <stop offset="50%" stop-color="#0e0c0a"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <radialGradient id="spotA" cx="350" cy="300" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5a46d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="spotB" cx="900" cy="250" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c5a46d" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1400" height="1000" fill="url(#retailG)"/>
  <rect width="1400" height="1000" fill="url(#spotA)"/>
  <rect width="1400" height="1000" fill="url(#spotB)"/>
  <!-- Display tables -->
  <rect x="150" y="400" width="300" height="20" rx="2" fill="#2a2010" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.5"/>
  <rect x="225" y="300" width="150" height="100" fill="#241e10" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.35"/>
  <rect x="600" y="420" width="200" height="16" rx="2" fill="#2a2010" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.5"/>
  <rect x="950" y="380" width="280" height="20" rx="2" fill="#2a2010" stroke="#c5a46d" stroke-width="0.5" stroke-opacity="0.5"/>
  <!-- Vertical display bars -->
  <rect x="350" y="100" width="2" height="600" fill="#c5a46d" opacity="0.2"/>
  <rect x="700" y="100" width="2" height="600" fill="#c5a46d" opacity="0.15"/>
  <rect x="1050" y="100" width="2" height="600" fill="#c5a46d" opacity="0.2"/>
  <!-- Ceiling track lighting -->
  <rect x="0" y="80" width="1400" height="2" fill="#c5a46d" opacity="0.15"/>
  <!-- Label -->
  <text x="100" y="950" font-family="Georgia, serif" font-size="14" fill="#c5a46d" opacity="0.6" letter-spacing="4">PREMIUM RETAIL GALLERY · BANJARA HILLS</text>
</svg>
